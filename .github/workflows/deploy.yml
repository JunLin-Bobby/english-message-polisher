name: Deploy English Polisher to AWS

# 觸發條件：當程式碼被推送到 main 分支時啟動
on:
  push:
    branches:
      - main

# 權限設定：這是 OIDC (無金鑰登入) 的必要設定，允許 GitHub 向 AWS 索取臨時通行證
permissions:
  id-token: write
  contents: read

jobs:
  # ==========================================
  # 軌道一：前端部署 (React -> S3 -> CloudFront)
  # ==========================================
  deploy-frontend:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    
    # 這裡指定只有當 frontend 資料夾內的檔案有變動時，才執行這個 Job，省時又省錢！
    # (如果 GitHub 無法判斷，可以直接移除 paths 條件讓它每次都跑)
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # 請確認與你本地端使用的 Node 版本一致

      - name: Install Dependencies
        run: npm ci

      - name: Build Static Files (React)
        run: npm run build

      # 透過 OIDC 登入 AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }} # 我們稍後要在 AWS 建立這個角色
          aws-region: us-east-1

      # 將打包好的 dist 資料夾同步到 S3 (加上 --delete 代表 S3 上多餘的舊檔案也會被刪除)
      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET_NAME }} --delete

      # 呼叫 CloudFront 清除全球快取，讓使用者立刻看到最新畫面
      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_CLOUDFRONT_ID }} --paths "/*"

  # ==========================================
  # 軌道二：後端部署 (FastAPI -> ECR -> ECS)
  # ==========================================
  deploy-backend:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 透過 OIDC 登入 AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      # 登入到 Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 建立 Docker Image 並推送到 ECR
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: english-polisher-backend # 必須與 Terraform 裡設定的名字一致
          IMAGE_TAG: ${{ github.sha }} # 使用 Git Commit 的 Hash 值作為 Image 標籤，確保每次都不一樣
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          # 同時推一個 latest 標籤方便辨識
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # 下載目前的 ECS Task Definition (任務藍圖)
      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition --task-definition english-polisher-backend-task --query taskDefinition > task-def.json

      # 將剛剛推送到 ECR 的新 Image 替換進任務藍圖裡
      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend/task-def.json
          container-name: fastapi-container # 必須與 Terraform 裡設定的名字一致
          image: ${{ steps.login-ecr.outputs.registry }}/english-polisher-backend:${{ github.sha }}

      # 將新的藍圖交給 ECS，觸發滾動更新！
      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: english-polisher-backend-svc
          cluster: english-polisher-cluster
          wait-for-service-stability: true # 讓機器人等容器成功啟動並被 ALB 承認健康後，才算部署成功