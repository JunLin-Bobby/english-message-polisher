name: Continuous Integration (CI)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ---------------------------------------------------------
  # 1. BACKEND CI: Linting and Unit Tests
  # ---------------------------------------------------------
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: pytest tests/ -v

  # ---------------------------------------------------------
  # 2. FRONTEND CI: Build Verification 
  # ---------------------------------------------------------
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci
        
      - name: Build Frontend
        run: npm run build

  # ---------------------------------------------------------
  # 3. INFRASTRUCTURE CI: Docker Build & Smoke Test
  # 注意：CMD 已改成 main.handler (Lambda 模式)
  # 所以 smoke test 改用 uvicorn 直接啟動，不再用 gunicorn
  # ---------------------------------------------------------
  docker-smoke-test:
    needs: [backend-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: fastapi-backend:ci-test
          load: true

      - name: Smoke Test Backend
        run: |
          # CMD is now set to main.handler (Lambda mode) and cannot serve HTTP directly.
          # Override the entrypoint with uvicorn for local smoke testing purposes.
          docker run -d -p 8000:8000 \
            -e GEMINI_API_KEY="dummy_key_for_ci" \
            --name test-backend \
            --entrypoint uvicorn \
            fastapi-backend:ci-test \
            main:app --host 0.0.0.0 --port 8000

          # Wait uvicorn startup
          sleep 5

          # Make sure the container is running
          if [ "$(docker inspect -f '{{.State.Running}}' test-backend)" != "true" ]; then
            echo "Backend container crashed on startup!"
            docker logs test-backend
            exit 1
          fi

          # 打 /docs 確認 FastAPI 正常回應
          curl --fail http://localhost:8000/docs || (echo "Backend is not responding properly" && exit 1)